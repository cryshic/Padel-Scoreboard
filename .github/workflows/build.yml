name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
uses: actions/checkout@v4
uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
uses: android-actions/setup-android@v3
run: chmod +x padel-wearos/gradlew
run: cd padel-wearos && ./gradlew assembleDebug --no-daemon
uses: actions/upload-artifact@v4
with:
  name: padel-scoreboard
  path: padel-wearos/app/build/outputs/apk/debug/app-debug.apk
